# =============================================================================
# Vork — Docker Compose
#
# Usage:
#   docker compose up --build
#
# AI provider keys can be configured through the Settings UI after first login,
# or supplied as environment variables (see the vork service below).
# =============================================================================

services:

  # ── MongoDB ─────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:8
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    # Expose locally for admin tools (Compass etc.); remove in production.
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Vork application ─────────────────────────────────────────────────────────
  vork:
    build:
      # Build directly from this repository root
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "8443:8443"
    environment:
      # MongoDB — these env vars override conf.d/database.properties
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DATABASE: vork

      # AI provider API keys — set whichever provider(s) you want to use.
      # These can also be configured through the Settings UI after first login.
      # SPRING_AI_GOOGLE_GENAI_APIKEY: your-gemini-key
      # SPRING_AI_OPENAI_API_KEY: your-openai-key
      # SPRING_AI_GROQ_API_KEY: your-groq-key
      # SPRING_AI_OLLAMA_BASE_URL: http://host.docker.internal:11434

      # SSL certificate directory (default: conf.d/ssl inside the container).
      # Override with an absolute path to mount external certs.
      # VORK_SSL_CERT_DIR: /app/conf.d/ssl
    volumes:
      # Optional: mount your local conf.d/ so custom settings are preserved
      # across container rebuilds. Comment out if you prefer env-var-only config.
      - ./conf.d:/app/conf.d

volumes:
  mongodb_data:
