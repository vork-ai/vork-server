<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Inspector — Vork</title>
    <link rel="icon" type="image/png" href="/images/Vork-Faviconx128.png">
    <link rel="stylesheet" href="/css/tailwind.css">
    <link rel="stylesheet" href="/packages/npm.fortawesome/fontawesome-free/current/css/all.min.css">
    <link rel="stylesheet" href="/css/vork.css">
    <link rel="stylesheet" href="/packages/npm.fortawesome/fontawesome-free/current/css/all.min.css">
    <link rel="stylesheet" href="/css/data-inspector.css">
</head>
<body class="bg-zinc-950 text-zinc-100">
<div th:replace="~{fragments/header :: header}"></div>

<!-- Type selector bar -->
<div class="inspector-type-bar">
    <div class="container-fluid d-flex align-items-center gap-3 py-2 px-3">
        <span class="text-muted small fw-semibold text-nowrap">
            <i class="fa-solid fa-database me-1"></i> Record
        </span>
        <select id="type-select" class="form-select form-select-sm inspector-type-select">
            <option value="">— select a record schema —</option>
        </select>
        <div id="type-actions" class="d-none d-flex align-items-center gap-2 ms-auto">
            <span id="type-count-badge" class="badge text-bg-secondary"></span>
            <button id="create-btn" type="button" class="btn btn-sm btn-primary text-nowrap">
                <i class="fa-solid fa-plus me-1"></i>Create
            </button>
        </div>
    </div>
</div>

<div class="container-fluid px-3 py-3">

    <!-- Initial / loading / empty states -->
    <div id="state-initial" class="inspector-state text-center py-5 text-muted">
        <i class="fa-solid fa-database fa-2x mb-3 d-block"></i>
        <p class="mb-0">Select a type above to inspect its data.</p>
    </div>

    <div id="state-loading" class="inspector-state d-none text-center py-5 text-muted">
        <div class="spinner-border text-secondary mb-3" role="status">
            <span class="visually-hidden">Loading…</span>
        </div>
        <p class="mb-0">Loading data…</p>
    </div>

    <div id="state-empty" class="inspector-state d-none text-center py-5 text-muted">
        <i class="fa-solid fa-inbox fa-2x mb-3 d-block"></i>
        <p class="mb-1">No records found.</p>
        <button class="btn btn-sm btn-outline-primary mt-2" onclick="document.getElementById('create-btn').click()">
            <i class="fa-solid fa-plus me-1"></i>Create your first record
        </button>
    </div>

    <div id="state-error" class="inspector-state d-none">
        <div class="alert alert-danger" id="error-message"></div>
    </div>

    <!-- Data table -->
    <div id="state-table" class="inspector-state d-none">
        <div class="d-flex flex-column flex-md-row gap-2 mb-3 align-items-md-center">
            <select id="search-query-type" class="form-select form-select-sm" style="max-width: 140px;">
                <option value="SQL" selected>SQL</option>
                <option value="MONGO">Mongo JSON</option>
            </select>
            <input id="search-query" type="text" class="form-control form-control-sm"
                   placeholder="Search records (e.g. status = 'ACTIVE' AND age >= 2)">
            <button id="search-apply-btn" type="button" class="btn btn-sm btn-outline-primary text-nowrap">
                <i class="fa-solid fa-magnifying-glass me-1"></i>Search
            </button>
            <button id="search-clear-btn" type="button" class="btn btn-sm btn-outline-secondary text-nowrap">
                <i class="fa-solid fa-xmark me-1"></i>Clear
            </button>
        </div>
        <div class="table-responsive">
            <table class="table table-sm table-hover inspector-table align-middle mb-0">
                <thead id="table-head"></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="d-flex align-items-center justify-content-between mt-3 px-1">
            <span id="pagination-info" class="text-muted small"></span>
            <div class="d-flex gap-2">
                <button id="prev-btn" type="button" class="btn btn-sm btn-outline-secondary" disabled>
                    <i class="fa-solid fa-chevron-left"></i> Previous
                </button>
                <button id="next-btn" type="button" class="btn btn-sm btn-outline-secondary" disabled>
                    Next <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </div>

</div>

<!-- Create / Edit modal -->
<div class="modal fade" id="record-modal" tabindex="-1" aria-labelledby="record-modal-label" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="record-modal-label">Create record</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- dynamic form rendered here by data-inspector.js -->
            </div>
            <div class="modal-footer">
                <span id="modal-error" class="text-danger small me-auto d-none"></span>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" id="modal-save-btn" class="btn btn-primary">
                    <i class="fa-solid fa-floppy-disk me-1"></i>Save
                </button>
            </div>
        </div>
    </div>
</div>

<script src="/js/vork-modal.js"></script>
<script src="/js/data-inspector.js"></script>
</body>
</html>
