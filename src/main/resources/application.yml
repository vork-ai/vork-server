spring:
  ai:
    google:
      genai:
        # Set GEMINI_API_KEY environment variable, or replace the default below.
        # Get a key at https://aistudio.google.com/app/apikey
        api-key: AIzaSyBETFkkMz1qyNsK6VOQM1F1D8j8sH7wGwc
        chat:
          options:
            model: gemini-2.5-flash
            thinking-budget: 0
            include-thoughts: false

  # Thymeleaf configuration for login and authorization pages
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false

  # Security configuration
  security:
    user:
      name: admin
      password: admin123

# ── SSL / HTTPS ───────────────────────────────────────────────────────────────
# Vork auto-generates a self-signed certificate on first startup in conf.d/ssl/.
# Override these defaults via environment variables or system properties:
#
#   VORK_SSL_CERT_DIR   (or -Dvork.ssl.cert-dir=...)  — path to PEM cert directory
#   SERVER_PORT         (or -Dserver.port=...)         — HTTPS port (default 8443)
#   VORK_SSL_HTTP_PORT  (or -Dvork.ssl.http-port=...)  — HTTP redirect port (default 8080)
#
# Explicit defaults (omit to use the built-in defaults above):
# vork:
#   ssl:
#     cert-dir: conf.d/ssl
#     http-port: 8080

# When adding a second provider, add its block here, e.g.:
#  openai:
#    api-key: ${OPENAI_API_KEY:}
#    chat:
#      options:
#        model: gpt-4o
