<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vork AI Chat</title>
    <link rel="icon" type="image/png" href="/images/Vork-Faviconx128.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/css/chat.css">
</head>
<body>

<!-- Splash screen -->
<div id="splash">
    <img src="/images/Vork.png" alt="Vork">
</div>

<div class="chat-layout">

    <!-- Header -->
    <header class="chat-header d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center gap-2">
            <img src="/images/Vork-Header.png" alt="Vork" class="header-logo">
            <span class="text-secondary small ps-1">AI Chat</span>
            <span id="status-dot" class="status-dot connecting ms-1" title="Connecting&hellip;"></span>
        </div>
        <div class="d-flex align-items-center gap-2">
            <select id="provider-select" class="form-select form-select-sm provider-select">
                <option value="GEMINI" selected>Gemini</option>
                <option value="OPENAI">OpenAI</option>
                <option value="ANTHROPIC">Anthropic</option>
            </select>
        </div>
    </header>

    <!-- Messages -->
    <main id="messages-area" class="chat-messages">

        <div id="typing-indicator" class="message-row d-none">
            <div class="avatar assistant"><i class="fa-solid fa-robot"></i></div>
            <div class="bubble assistant typing-bubble">
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
            </div>
        </div>

    </main>

    <!-- Input area -->
    <div class="chat-input-area">
        <form id="chat-form" class="d-flex gap-2 align-items-end">
            <textarea
                id="message-input"
                class="form-control"
                rows="1"
                placeholder="Message Vork&hellip; (Enter to send &middot; Shift+Enter for new line)"
                autocomplete="off"></textarea>
            <button type="submit" id="send-btn" class="btn btn-primary send-btn">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </form>
        <div class="text-secondary mt-1 session-label">
            Session: <code id="session-display">initialising&hellip;</code>
        </div>
    </div>

</div>

<!-- CDN dependencies -->
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>

<!-- Application -->
<script src="/js/chat.js"></script>

</body>
</html>
