<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" width="900" height="340">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#061225;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0080b0;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="340" fill="url(#bgGrad)"/>
  <rect width="900" height="340" fill="url(#glowCenter)"/>

  <!-- Grid lines (circuit board aesthetic) -->
  <g stroke="#0d2a40" stroke-width="1" opacity="0.6">
    <line x1="0" y1="60" x2="900" y2="60"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="180" x2="900" y2="180"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="300" x2="900" y2="300"/>
    <line x1="100" y1="0" x2="100" y2="340"/>
    <line x1="200" y1="0" x2="200" y2="340"/>
    <line x1="300" y1="0" x2="300" y2="340"/>
    <line x1="400" y1="0" x2="400" y2="340"/>
    <line x1="500" y1="0" x2="500" y2="340"/>
    <line x1="600" y1="0" x2="600" y2="340"/>
    <line x1="700" y1="0" x2="700" y2="340"/>
    <line x1="800" y1="0" x2="800" y2="340"/>
  </g>

  <!-- Central shield / lock icon -->
  <g transform="translate(145, 80)" filter="url(#softGlow)">
    <!-- Shield shape -->
    <path d="M85,0 L170,35 L170,110 Q170,165 85,195 Q0,165 0,110 L0,35 Z" fill="#051b30" stroke="#00e5ff" stroke-width="2.5" opacity="0.9"/>
    <!-- Lock body -->
    <rect x="57" y="95" width="56" height="44" rx="6" fill="url(#lockGrad)" opacity="0.9"/>
    <!-- Lock shackle -->
    <path d="M70,95 L70,75 Q85,55 100,75 L100,95" fill="none" stroke="#00e5ff" stroke-width="7" stroke-linecap="round"/>
    <!-- Keyhole -->
    <circle cx="85" cy="114" r="7" fill="#051b30"/>
    <rect x="82" y="114" width="6" height="12" rx="2" fill="#051b30"/>
  </g>

  <!-- Certificate doc icon (right side) -->
  <g transform="translate(685, 90)">
    <rect x="0" y="0" width="80" height="100" rx="6" fill="#051b30" stroke="#00e5ff" stroke-width="1.5" opacity="0.85"/>
    <line x1="12" y1="28" x2="68" y2="28" stroke="#00e5ff" stroke-width="2" opacity="0.7"/>
    <line x1="12" y1="45" x2="68" y2="45" stroke="#00e5ff" stroke-width="1.5" opacity="0.5"/>
    <line x1="12" y1="60" x2="68" y2="60" stroke="#00e5ff" stroke-width="1.5" opacity="0.5"/>
    <line x1="12" y1="75" x2="50" y2="75" stroke="#00e5ff" stroke-width="1.5" opacity="0.5"/>
    <!-- Certificate star seal -->
    <circle cx="60" cy="82" r="12" fill="#00e5ff" opacity="0.2" stroke="#00e5ff" stroke-width="1.5"/>
    <text x="60" y="87" text-anchor="middle" font-size="12" fill="#00e5ff" opacity="0.9">✓</text>
  </g>

  <!-- Waveform / sound waves (transcription) -->
  <g transform="translate(320, 105)" filter="url(#glow)" opacity="0.75">
    <rect x="0"  y="40" width="8" height="30" rx="4" fill="#00e5ff"/>
    <rect x="14" y="25" width="8" height="60" rx="4" fill="#00e5ff"/>
    <rect x="28" y="15" width="8" height="80" rx="4" fill="#00e5ff"/>
    <rect x="42" y="30" width="8" height="50" rx="4" fill="#00e5ff"/>
    <rect x="56" y="20" width="8" height="70" rx="4" fill="#00e5ff"/>
    <rect x="70" y="35" width="8" height="40" rx="4" fill="#00e5ff"/>
    <rect x="84" y="10" width="8" height="90" rx="4" fill="#00e5ff"/>
    <rect x="98" y="30" width="8" height="50" rx="4" fill="#00e5ff"/>
    <rect x="112" y="45" width="8" height="20" rx="4" fill="#00e5ff"/>
  </g>

  <!-- Connection lines from shield to wave and wave to cert -->
  <g stroke="#00e5ff" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.35">
    <line x1="315" y1="170" x2="325" y2="155"/>
    <line x1="445" y1="155" x2="688" y2="165"/>
  </g>

  <!-- Horizontal rule / accent line -->
  <line x1="50" y1="285" x2="850" y2="285" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>

  <!-- Title text -->
  <text x="450" y="52" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#00e5ff" opacity="0.65" letter-spacing="5">VORK MAINFRAME INTELLIGENCE REPORT</text>

  <!-- Main headline -->
  <text x="450" y="248" text-anchor="middle" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="#ffffff" filter="url(#glow)">Journal 005: Lock &amp; Listen</text>

  <!-- Sub headline -->
  <text x="450" y="278" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#00e5ff" opacity="0.8" letter-spacing="2">HTTPS ENCRYPTION · VOICE TRANSCRIPTION · AUTO-RENEWAL</text>

  <!-- Date stamp -->
  <text x="450" y="318" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#00e5ff" opacity="0.45">9 JUNE 2026</text>

  <!-- Corner decorations -->
  <g stroke="#00e5ff" stroke-width="1.5" fill="none" opacity="0.4">
    <polyline points="20,20 20,5 35,5"/>
    <polyline points="880,20 880,5 865,5"/>
    <polyline points="20,320 20,335 35,335"/>
    <polyline points="880,320 880,335 865,335"/>
  </g>

  <!-- Data stream dots (left) -->
  <g fill="#00e5ff" opacity="0.3">
    <circle cx="60" cy="165" r="2"/>
    <circle cx="60" cy="178" r="2"/>
    <circle cx="60" cy="191" r="2"/>
    <circle cx="60" cy="204" r="2"/>
    <circle cx="60" cy="217" r="2"/>
  </g>
  <!-- Data stream dots (right) -->
  <g fill="#00e5ff" opacity="0.3">
    <circle cx="840" cy="165" r="2"/>
    <circle cx="840" cy="178" r="2"/>
    <circle cx="840" cy="191" r="2"/>
    <circle cx="840" cy="204" r="2"/>
    <circle cx="840" cy="217" r="2"/>
  </g>
</svg>
