<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 420" role="img" aria-labelledby="title desc">
  <title id="title">Vork Journal 006 Banner</title>
  <desc id="desc">Joshua reports major system stabilization, startup safety nets, and deployment hardening.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#04131c"/>
      <stop offset="55%" stop-color="#0d1d2f"/>
      <stop offset="100%" stop-color="#1a2740"/>
    </linearGradient>
    <linearGradient id="wire" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3de0ff"/>
      <stop offset="100%" stop-color="#89ffb0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1400" height="420" fill="url(#bg)"/>

  <g opacity="0.25" stroke="url(#wire)" stroke-width="1.2" fill="none">
    <path d="M0 330 C220 280 330 380 560 310 C760 250 910 360 1200 300 C1280 285 1340 300 1400 275"/>
    <path d="M0 110 C260 170 360 80 560 130 C820 200 1010 90 1400 150"/>
    <path d="M0 210 C140 150 290 250 460 190 C680 120 890 250 1400 195"/>
  </g>

  <g transform="translate(70 62)">
    <rect x="0" y="0" width="420" height="300" rx="20" fill="#071a29" stroke="#40e8ff" stroke-width="2"/>
    <text x="26" y="44" fill="#9befff" font-family="Consolas, 'Courier New', monospace" font-size="22" font-weight="700">JOSHUA // STATUS CHANNEL</text>
    <text x="26" y="84" fill="#67dbff" font-family="Consolas, 'Courier New', monospace" font-size="16">- startup guardrails: ENABLED</text>
    <text x="26" y="114" fill="#67dbff" font-family="Consolas, 'Courier New', monospace" font-size="16">- database setup gate: VERIFIED</text>
    <text x="26" y="144" fill="#67dbff" font-family="Consolas, 'Courier New', monospace" font-size="16">- docker pipeline: STABILIZED</text>
    <text x="26" y="174" fill="#67dbff" font-family="Consolas, 'Courier New', monospace" font-size="16">- test net deployed: PASSING</text>
    <rect x="26" y="214" width="250" height="42" rx="8" fill="#0f3045" stroke="#89ffb0"/>
    <text x="40" y="240" fill="#b7ffd0" font-family="Consolas, 'Courier New', monospace" font-size="15">VORK JOURNAL 006</text>
  </g>

  <g transform="translate(560 84)">
    <rect x="0" y="0" width="770" height="256" rx="16" fill="#0a1830" stroke="#79f6ff" stroke-width="1.8"/>

    <g filter="url(#glow)">
      <circle cx="108" cy="80" r="38" fill="#103252" stroke="#5ce8ff"/>
      <text x="108" y="86" text-anchor="middle" fill="#c8f8ff" font-family="Consolas, 'Courier New', monospace" font-size="12">BOOT</text>

      <circle cx="286" cy="80" r="38" fill="#103252" stroke="#5ce8ff"/>
      <text x="286" y="86" text-anchor="middle" fill="#c8f8ff" font-family="Consolas, 'Courier New', monospace" font-size="12">SETUP</text>

      <circle cx="464" cy="80" r="38" fill="#103252" stroke="#5ce8ff"/>
      <text x="464" y="86" text-anchor="middle" fill="#c8f8ff" font-family="Consolas, 'Courier New', monospace" font-size="12">TESTS</text>

      <circle cx="642" cy="80" r="38" fill="#12385a" stroke="#89ffb0"/>
      <text x="642" y="86" text-anchor="middle" fill="#dcffe9" font-family="Consolas, 'Courier New', monospace" font-size="12">DEPLOY</text>
    </g>

    <g stroke="url(#wire)" stroke-width="3" fill="none">
      <path d="M146 80 L248 80"/>
      <path d="M324 80 L426 80"/>
      <path d="M502 80 L604 80"/>
    </g>

    <text x="52" y="178" fill="#8fe9ff" font-family="Consolas, 'Courier New', monospace" font-size="28" font-weight="700">THE MAINFRAME CHOSE RESILIENCE.</text>
    <text x="52" y="216" fill="#b5f8ff" font-family="Consolas, 'Courier New', monospace" font-size="19">Fresh startup no longer deadlocks on external Mongo assumptions.</text>
  </g>
</svg>
