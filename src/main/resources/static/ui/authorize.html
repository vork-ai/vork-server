<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorize Tool Execution - Vork</title>
    <link rel="icon" type="image/png" href="/images/Vork-Faviconx128.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/css/chat.css">
    <link rel="stylesheet" href="/css/authorize.css">
</head>
<body>
<div class="authorize-page">
    <header class="chat-header d-flex align-items-center justify-content-center">
        <div class="d-flex align-items-center gap-2">
            <img src="/images/Vork-Header.png" alt="Vork" class="header-logo">
            <span class="text-secondary small ps-1">Tool Authorization</span>
        </div>
    </header>

    <main class="authorize-main container py-4">
        <section id="authorize-card" class="authorize-card bubble assistant prompt-required mx-auto">
            <div class="prompt-title d-flex align-items-center gap-2">
                <i class="fa-solid fa-shield-halved"></i>
                <span>Authorize Tool Execution</span>
            </div>

            <details id="reasoning-wrap" class="prompt-reasoning" open>
                <summary>Why this action is requested</summary>
                <div id="reasoning" class="prompt-reasoning-body"></div>
            </details>

            <details class="prompt-args-toggle" open>
                <summary>Tool Arguments</summary>
                <pre id="tool-args" class="prompt-args"></pre>
            </details>

            <div class="prompt-actions mt-3">
                <button type="button" id="once-btn" class="btn btn-outline-primary prompt-action-btn">ONCE</button>
                <button type="button" id="session-btn" class="btn btn-outline-primary prompt-action-btn">SESSION</button>
                <button type="button" id="always-btn" class="btn btn-outline-primary prompt-action-btn">ALWAYS</button>
            </div>

            <div id="feedback" class="mt-3 d-none"></div>
        </section>
    </main>
</div>

<script src="/js/authorize.js"></script>
</body>
</html>
